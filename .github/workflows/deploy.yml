name: Deploy

on:
  workflow_run:
    workflows: [Docker]
    types: [completed]
    branches: [main]

# Required GitHub secrets:
#   DEPLOY_HOST     - production server IP or hostname
#   DEPLOY_USER     - SSH user, for example deploy
#   DEPLOY_SSH_KEY  - private key for SSH authentication
#   DEPLOY_PATH     - absolute path to project on server, for example /opt/arl-airport-platform
#   DEPLOY_WEBHOOK_URL - (optional) Discord/Slack webhook for failure notifications

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to production
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -eu
            cd "${{ secrets.DEPLOY_PATH }}"

            sha="${{ github.event.workflow_run.head_sha }}"
            new_image="ghcr.io/${{ github.repository }}:${sha}"
            compose="docker compose --env-file deploy.env -f docker-compose.prod.yml"

            echo "==> Pulling latest code..."
            git pull origin main

            if [ -f .env ]; then
              set -a
              . ./.env
              set +a
            fi

            if [ -z "${DATABASE_DIRECT_URL:-}" ]; then
              echo "DATABASE_DIRECT_URL is required for migrations" >&2
              exit 1
            fi

            echo "==> Saving current image for rollback..."
            previous_image=""
            if [ -f deploy.env ]; then
              previous_image="$(grep '^APP_IMAGE=' deploy.env 2>/dev/null | tail -1 | cut -d= -f2- || true)"
            fi
            if [ -z "$previous_image" ] && [ -f .env ]; then
              previous_image="$(grep '^APP_IMAGE=' .env 2>/dev/null | tail -1 | cut -d= -f2- || true)"
            fi
            printf '%s\n' "$previous_image" > /tmp/arl-prev-image.txt

            echo "==> Pinning deploy image: $new_image"
            {
              printf 'APP_IMAGE=%s\n' "$new_image"
              printf 'NEXT_PUBLIC_BUILD_VERSION=%s\n' "$sha"
            } > deploy.env

            rollback_image() {
              previous="$(cat /tmp/arl-prev-image.txt 2>/dev/null || true)"
              if [ -z "$previous" ]; then
                echo "No previous APP_IMAGE recorded; manual intervention required." >&2
                return 1
              fi
              echo "==> Restoring previous image: $previous"
              previous_version="${previous##*:}"
              {
                printf 'APP_IMAGE=%s\n' "$previous"
                printf 'NEXT_PUBLIC_BUILD_VERSION=%s\n' "$previous_version"
              } > deploy.env
              $compose pull app || true
              $compose up -d --remove-orphans
            }

            echo "==> Pulling pinned Docker image..."
            if ! $compose pull app; then
              rollback_image || true
              exit 1
            fi

            echo "==> Running database migrations from new image..."
            if ! $compose run --rm \
              -e DATABASE_URL="${DATABASE_DIRECT_URL}" \
              app pnpm migrate; then
              rollback_image || true
              exit 1
            fi

            echo "==> Scaling up app replicas..."
            if command -v jq > /dev/null 2>&1; then
              target="$($compose config --format json | jq -r '.services.app.deploy.replicas // 4')"
            else
              echo "Warning: jq is not available; defaulting rollout target to 4 replicas"
              target=4
            fi
            $compose up -d --scale app=$((target * 2)) --no-deps app

            echo "==> Waiting for readiness..."
            ready=false
            for i in $(seq 1 60); do
              if curl -ksf --max-time 2 https://localhost/api/ready > /dev/null 2>&1; then
                ready=true
                break
              fi
              sleep 1
            done

            if [ "$ready" != "true" ]; then
              echo "==> READINESS CHECK FAILED. Rolling back image..."
              rollback_image || true
              exit 1
            fi

            $compose exec -T nginx nginx -s reload 2>/dev/null || $compose restart nginx

            echo "==> Scaling down to target replicas..."
            $compose up -d --scale app="$target" --remove-orphans

            echo "==> Pruning old images..."
            docker image prune -f

            echo "==> Waiting for health check..."
            attempts=0
            healthy=false
            until curl -ksf --max-time 5 https://localhost/api/health > /dev/null 2>&1; do
              attempts=$((attempts + 1))
              if [ "$attempts" -ge 30 ]; then
                break
              fi
              sleep 2
            done

            if curl -ksf --max-time 5 https://localhost/api/health > /dev/null 2>&1; then
              healthy=true
            fi

            if [ "$healthy" = "true" ]; then
              echo "==> Deploy complete. Health check passed."
              echo "$(date -Iseconds) deploy=success image=$new_image commit=$(git rev-parse --short HEAD)" >> deploy.log
              exit 0
            fi

            echo "==> HEALTH CHECK FAILED after 30 attempts. Rolling back..."

            rollback_image || true

            # Wait for rollback to stabilize
            rollback_ok=false
            for i in $(seq 1 15); do
              if curl -ksf --max-time 5 https://localhost/api/health > /dev/null 2>&1; then
                rollback_ok=true
                break
              fi
              sleep 2
            done

            if [ "$rollback_ok" = "true" ]; then
              echo "==> Rollback succeeded. Previous version restored."
            else
              echo "==> CRITICAL: Rollback also failed. Manual intervention required."
            fi

            echo "$(date -Iseconds) deploy=rollback failed_image=$new_image commit=$(git rev-parse --short HEAD)" >> deploy.log

            exit 1

      - name: Notify deploy failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            curl -sf -X POST "${{ secrets.DEPLOY_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"ARL deploy failed and rolled back. Check GitHub Actions.\"}" \
              2>/dev/null || true
