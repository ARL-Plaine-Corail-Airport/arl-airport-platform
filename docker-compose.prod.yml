# =============================================================================
# ARL Airport Platform — Production Docker Compose
# Horizontal scaling with Nginx load balancer + multiple app replicas
#
# Usage:
#   docker compose -f docker-compose.prod.yml up --build -d
#
# Requires:
#   - .env file with all production secrets
#   - Built Docker image (uses the "runner" stage from Dockerfile)
# =============================================================================

services:
  # ── Nginx Reverse Proxy / Load Balancer ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: arl-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    environment:
      DOMAIN: ${DOMAIN:-}
    command: >
      /bin/sh -c "if [ -n \"$${DOMAIN:-}\" ]; then
        envsubst '$${DOMAIN}' < /etc/nginx/templates/default.conf.template > /etc/nginx/nginx.conf;
      else
        cp /etc/nginx/nginx-fallback.conf /etc/nginx/nginx.conf;
      fi;
      while :; do sleep 6h & wait $$!; nginx -s reload; done &
      nginx -g 'daemon off;'"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx-fallback.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./nginx/conf.d:/etc/nginx/templates:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - arl-network
    healthcheck:
      test: ['CMD-SHELL', 'wget --no-check-certificate -qO- https://127.0.0.1/api/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Application (Next.js + Payload CMS) — scaled to 10 replicas ───────────
  app:
    image: ${APP_IMAGE:?APP_IMAGE is required. Use deploy.env with a pinned image SHA.}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://localhost}
        NEXT_PUBLIC_SITE_URLS: ${NEXT_PUBLIC_SITE_URLS:-}
        ADDITIONAL_ALLOWED_ORIGINS: ${ADDITIONAL_ALLOWED_ORIGINS:-}
        NEXT_PUBLIC_BUILD_VERSION: ${NEXT_PUBLIC_BUILD_VERSION:-}
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-https://placeholder.supabase.co}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-placeholder}
        SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      # Uses the production "runner" stage (standalone output)
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: '1'
      NEXT_PUBLIC_BUILD_VERSION: ${NEXT_PUBLIC_BUILD_VERSION:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
    deploy:
      replicas: 4 # Local/staging. Set to 10+ for production (40K concurrent users).
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: 'json-file'
      options:
        max-size: '50m'
        max-file: '5'
    expose:
      - '3000'
    networks:
      - arl-network
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://localhost:3000/api/health'').then(r=>{if(!r.ok)throw r.status}).catch(()=>process.exit(1))"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Redis (local/staging only — use Upstash in production) ─────────────────
  # For local staging tests. In cloud production, set UPSTASH_REDIS_REST_URL
  # and UPSTASH_REDIS_REST_TOKEN in .env and remove this service.
  # Certbot (Let's Encrypt certificate renewal)
  certbot:
    image: certbot/certbot
    container_name: arl-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $$!; done;'"
    networks:
      - arl-network
    restart: unless-stopped

  # Automated database backups
  backup:
    image: postgres:16-alpine
    container_name: arl-backup
    volumes:
      - ./scripts:/scripts:ro
      - ./backups:/app/backups
    environment:
      DATABASE_DIRECT_URL: ${DATABASE_DIRECT_URL}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_DIR: /app/backups
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    entrypoint: >
      /bin/sh -c '
        apk add --no-cache aws-cli gzip > /dev/null 2>&1
        echo "0 2 * * * cd /app && sh /scripts/backup-cron.sh" > /etc/crontabs/root
        echo "Backup service started. Running daily at 02:00 UTC."
        crond -f -l 8
      '
    networks:
      - arl-network
    restart: unless-stopped

  # Weekly backup restore drill
  backup-restore-test:
    image: postgres:16-alpine
    container_name: arl-backup-restore-test
    volumes:
      - ./scripts:/scripts:ro
      - ./backups:/app/backups
    environment:
      DATABASE_DIRECT_URL: ${DATABASE_DIRECT_URL}
      RESTORE_TEST_DATABASE_URL: ${RESTORE_TEST_DATABASE_URL:-}
      BACKUP_DIR: /app/backups
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    entrypoint: >
      /bin/sh -c '
        apk add --no-cache aws-cli gzip > /dev/null 2>&1
        echo "0 4 * * 0 cd /app && sh /scripts/backup-restore-test.sh" > /etc/crontabs/root
        echo "Backup restore test service started. Running weekly on Sunday at 04:00 UTC."
        crond -f -l 8
      '
    networks:
      - arl-network
    restart: unless-stopped

  # Automated analytics retention purge
  page-view-retention:
    image: postgres:16-alpine
    container_name: arl-page-view-retention
    volumes:
      - ./scripts:/scripts:ro
    environment:
      DATABASE_DIRECT_URL: ${DATABASE_DIRECT_URL}
      PAGE_VIEW_RETENTION_DAYS: ${PAGE_VIEW_RETENTION_DAYS:-90}
      PAGE_VIEW_RETENTION_BATCH_SIZE: ${PAGE_VIEW_RETENTION_BATCH_SIZE:-10000}
    entrypoint: >
      /bin/sh -c '
        echo "0 3 * * * sh /scripts/purge-page-views.sh" > /etc/crontabs/root
        echo "Page-view retention service started. Running daily at 03:00 UTC."
        crond -f -l 8
      '
    networks:
      - arl-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: arl-redis
    restart: unless-stopped
    expose:
      - '6379'
    volumes:
      - arl_redis_data:/data
    networks:
      - arl-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  arl_redis_data:
    name: arl_redis_data

networks:
  arl-network:
    name: arl-network
    driver: bridge
